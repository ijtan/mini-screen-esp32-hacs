send_message:
  name: Send Message
  description: >-
    Send a message to one or all configured Mini Screen ESP32 devices.
  fields:
    message:
      name: Message
      description: The text to display on the screen.
      required: true
      example: "Hello, World!"
      selector:
        text:
          multiline: true

    style:
      name: Style
      description: >-
        Display style. "Updateable" is non-blocking and logs the message to
        the device history; all other styles block for the display duration.
      required: false
      default: "normal"
      example: "big"
      selector:
        select:
          options:
            - value: "normal"
              label: "Normal (small font)"
            - value: "big"
              label: "Big (large font)"
            - value: "important"
              label: "Important (flashes 15×)"
            - value: "critical"
              label: "Critical (flashes 25×)"
            - value: "inverted"
              label: "Inverted (small font, inverted)"
            - value: "inverted_big"
              label: "Inverted Big (large font, inverted)"
            - value: "updateable"
              label: "Updateable (non-blocking, logs to history)"

    font_size:
      name: Font Size
      description: >-
        Font size to use. Only applies when style is "updateable".
        1 = 10 px, 2 = 16 px, 3 = 24 px.
      required: false
      default: 2
      example: 2
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: box

    duration:
      name: Duration
      description: >-
        How long (in seconds) to display the message. Only applies when style
        is "updateable".
      required: false
      default: 5
      example: 10
      selector:
        number:
          min: 1
          max: 300
          step: 1
          unit_of_measurement: seconds
          mode: box

    show:
      name: Show on Screen
      description: >-
        Whether to actually display the message. Set to false to log it to the
        device history without showing it. Only applies when style is
        "updateable".
      required: false
      default: true
      selector:
        boolean:

    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        the message is sent to ALL configured devices.
      required: false
      example: "Mini Screen"
      selector:
        text:

flash:
  name: Flash Screen
  description: >-
    Flash the screen bright 5 times on one or all configured Mini Screen ESP32
    devices.
  fields:
    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are flashed.
      required: false
      example: "Mini Screen"
      selector:
        text:

clear:
  name: Clear Display
  description: >-
    Clear the display and cancel any pinned message, progress bar, or scrolling
    text on one or all configured Mini Screen ESP32 devices.
  fields:
    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are cleared.
      required: false
      example: "Mini Screen"
      selector:
        text:

unpin:
  name: Unpin Display
  description: >-
    Unpin the current pinned message and return to the default clock display on
    one or all configured Mini Screen ESP32 devices.
  fields:
    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are unpinned.
      required: false
      example: "Mini Screen"
      selector:
        text:

set_brightness:
  name: Set Brightness
  description: >-
    Set the OLED display brightness on one or all configured Mini Screen ESP32
    devices.
  fields:
    level:
      name: Brightness Level
      description: Brightness value from 0 (off) to 255 (maximum).
      required: true
      example: 128
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: slider

    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are updated.
      required: false
      example: "Mini Screen"
      selector:
        text:

set_dim_schedule:
  name: Set Dim Schedule
  description: >-
    Schedule the display to automatically dim at a set time each day and restore
    brightness at another time. Call with enabled: false to cancel the schedule.
  fields:
    enabled:
      name: Enabled
      description: Turn the dim schedule on or off.
      required: true
      default: true
      selector:
        boolean:

    start_time:
      name: Dim Time
      description: Time to dim the display each day (HH:MM, 24-hour).
      required: false
      default: "22:00"
      example: "22:00"
      selector:
        text:

    end_time:
      name: Restore Time
      description: Time to restore full brightness each day (HH:MM, 24-hour).
      required: false
      default: "07:00"
      example: "07:00"
      selector:
        text:

    dim_level:
      name: Dim Brightness
      description: Brightness level during the dim period (0–255).
      required: false
      default: 5
      example: 5
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: slider

    restore_level:
      name: Restore Brightness
      description: Brightness level to restore to after the dim period (0–255).
      required: false
      default: 255
      example: 255
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: slider

    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are updated.
      required: false
      example: "Mini Screen"
      selector:
        text:

pin_message:
  name: Pin Message
  description: >-
    Pin a static message to the display. The clock will not be shown while a
    message is pinned.
  fields:
    message:
      name: Message
      description: The text to pin on the screen.
      required: true
      example: "Do not disturb"
      selector:
        text:
          multiline: true

    font_size:
      name: Font Size
      description: "1 = 10 px, 2 = 16 px (default), 3 = 24 px."
      required: false
      default: 2
      example: 2
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: box

    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are updated.
      required: false
      example: "Mini Screen"
      selector:
        text:

scroll_message:
  name: Scroll Message
  description: >-
    Scroll a message continuously across the display from right to left.
  fields:
    message:
      name: Message
      description: The text to scroll across the screen.
      required: true
      example: "Breaking news: everything is fine."
      selector:
        text:
          multiline: false

    font_size:
      name: Font Size
      description: "1 = 10 px, 2 = 16 px (default), 3 = 24 px."
      required: false
      default: 2
      example: 2
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: box

    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are updated.
      required: false
      example: "Mini Screen"
      selector:
        text:

show_progress:
  name: Send Progress Bar
  description: >-
    Send a one-shot progress bar to one or all configured Mini Screen ESP32
    devices. Label and value text support HA templates.
  fields:
    value:
      name: Value
      description: Progress percentage (0 – 100).
      required: true
      example: 75
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

    label:
      name: Label
      description: >-
        Optional label shown above the progress bar. Supports HA templates
        (e.g. "{{ states('sensor.temp') }}°C").
      required: false
      example: "Downloading"
      selector:
        text:

    value_text:
      name: Value text
      description: >-
        Custom text shown below the bar instead of the default percentage.
        Supports HA templates (e.g. "{{ states('sensor.temp') }}°C").
        Leave empty to show the default percentage. Set to a single space " "
        to hide it entirely.
      required: false
      example: "23°C"
      selector:
        text:

    crit_threshold:
      name: Critical Threshold (%)
      description: >-
        When set (0–100), the progress bar blinks on/off every 500 ms once the
        value reaches or exceeds this percentage. Set to 0 to disable.
      required: false
      default: 0
      example: 95
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are updated.
      required: false
      example: "Mini Screen"
      selector:
        text:

pin_sensor:
  name: Pin Sensor
  description: >-
    Track a Home Assistant entity and pin its formatted value to the display.
    The display updates automatically whenever the entity state changes.
  fields:
    entity_id:
      name: Entity
      description: The entity whose state will be tracked and displayed.
      required: true
      example: "sensor.living_room_temperature"
      selector:
        entity:

    template:
      name: Template
      description: >-
        Display template. Use {{ value }} as a placeholder for the entity's
        current state. Example: "Temp: {{ value }} °C"
      required: false
      default: "{{ value }}"
      example: "Temp: {{ value }} °C"
      selector:
        text:

    font_size:
      name: Font Size
      description: "1 = 10 px, 2 = 16 px (default), 3 = 24 px."
      required: false
      default: 2
      example: 2
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: box

    auto_clear_delay:
      name: Auto-clear Delay
      description: >-
        Seconds to keep the display showing 100% before automatically returning
        to the clock. Set to 0 (default) to stay on screen indefinitely.
      required: false
      default: 0
      example: 10
      selector:
        number:
          min: 0
          max: 300
          step: 1
          unit_of_measurement: seconds
          mode: box

    value_font_size:
      name: Value Text Font Size
      description: "Font size for the text shown below the bar. 1 = 10 px (default), 2 = 16 px."
      required: false
      default: 1
      example: 2
      selector:
        number:
          min: 1
          max: 2
          step: 1
          mode: box

    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are updated.
      required: false
      example: "Mini Screen"
      selector:
        text:

pin_sensor_progress:
  name: Track Sensor as Progress Bar
  description: >-
    Subscribe to a numeric entity and display its value as a live progress bar.
    The display updates automatically on every state change. Label and value
    text support HA templates, re-rendered on each update.
  fields:
    entity_id:
      name: Entity
      description: The numeric entity to track.
      required: true
      example: "sensor.battery_level"
      selector:
        entity:

    min_value:
      name: Minimum Value
      description: >-
        The entity value that corresponds to 0 % on the progress bar.
      required: false
      default: 0
      example: 0
      selector:
        number:
          min: -1000
          max: 1000
          step: 1
          mode: box

    max_value:
      name: Maximum Value
      description: >-
        The entity value that corresponds to 100 % on the progress bar.
      required: false
      default: 100
      example: 100
      selector:
        number:
          min: -1000
          max: 1000
          step: 1
          mode: box

    label:
      name: Label
      description: >-
        Label shown above the progress bar. Supports HA templates
        (e.g. "{{ states('sensor.remaining_time') }} left").
        Defaults to the entity name if not provided. Re-rendered on each update.
      required: false
      example: "Battery"
      selector:
        text:

    value_type:
      name: Value Display
      description: >-
        What to show below the progress bar. "Percentage" shows the calculated
        percentage (default). "Raw value" shows the actual sensor value.
      required: false
      default: "percentage"
      selector:
        select:
          options:
            - value: "percentage"
              label: "Percentage (default)"
            - value: "raw"
              label: "Raw value"

    unit:
      name: Unit
      description: >-
        Unit suffix shown after the raw sensor value (e.g. "min", "°C", "km/h").
        Leave blank to use the entity's own unit automatically.
        Only applies when Value Display is set to Raw value.
      required: false
      example: "°C"
      selector:
        text:

    value_text:
      name: Value text (template)
      description: >-
        Custom template for the value shown below the bar. Use {{ value }} for
        the raw sensor state. Overrides the Unit field when set.
        Only applies when Value Display is set to Raw value.
      required: false
      example: "{{ value }} min left"
      selector:
        text:

    auto_clear_delay:
      name: Auto-clear Delay
      description: >-
        Seconds to keep the display showing 100% before automatically returning
        to the clock. Set to 0 (default) to stay on screen indefinitely.
      required: false
      default: 0
      example: 10
      selector:
        number:
          min: 0
          max: 300
          step: 1
          unit_of_measurement: seconds
          mode: box

    value_font_size:
      name: Value Text Font Size
      description: "Font size for the text shown below the bar. 1 = 10 px (default), 2 = 16 px."
      required: false
      default: 1
      example: 2
      selector:
        number:
          min: 1
          max: 2
          step: 1
          mode: box

    crit_threshold:
      name: Critical Threshold
      description: >-
        When set (non-zero), the bar blinks on/off every 500 ms once the value
        reaches or exceeds this threshold. In percentage mode enter 0–100 (0 = off).
        In raw mode enter the raw sensor value (0 = off).
      required: false
      default: 0
      example: 95
      selector:
        number:
          min: -10000
          max: 10000
          step: 0.1
          mode: box

    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are updated.
      required: false
      example: "Mini Screen"
      selector:
        text:

unpin_sensor:
  name: Unpin Sensor
  description: >-
    Stop tracking the active sensor and unpin the display, returning it to the
    default clock view.
  fields:
    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are updated.
      required: false
      example: "Mini Screen"
      selector:
        text:

send_image:
  name: Send Image
  description: >-
    Convert a PNG or JPG image to a 1-bit monochrome bitmap and display it on
    the screen. The image is resized to 128×64 by Home Assistant before sending.
    Provide either image_url or image_path.
  fields:
    image_url:
      name: Image URL
      description: >-
        URL of the image to fetch and display (http/https).
      required: false
      example: "https://example.com/image.png"
      selector:
        text:
    image_path:
      name: Image Path
      description: >-
        Absolute path to the image file on the Home Assistant server
        (e.g. /config/www/myimage.png).
      required: false
      example: "/config/www/myimage.png"
      selector:
        text:
    dither:
      name: Dithering
      description: >-
        Apply Floyd-Steinberg dithering when converting to monochrome. Improves
        appearance of photos; disable for sharp logos or icons.
      required: false
      default: true
      selector:
        boolean:
    device_name:
      name: Device Name
      description: >-
        Name of the specific Mini Screen ESP32 device to target. If omitted,
        all configured devices are updated.
      required: false
      example: "Mini Screen"
      selector:
        text:
